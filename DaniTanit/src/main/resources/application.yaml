spring:
  application:
    name: DaniTanit
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: changeInProd!
    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always